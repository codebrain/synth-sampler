version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: synthstudio
      POSTGRES_USER: synthstudio
      POSTGRES_PASSWORD: synthstudio
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  analysis-service:
    build:
      context: ../analysis-service
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - qdrant

volumes:
  postgres-data:
  qdrant-data:
